
# documentation.

name: API test framework

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    schedule:
    - cron: 00 18 * * *
    - cron: 00 3 * * * 

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Execute Tests
      run: mvn clean test -Dsuite=suite 
    - name: Upload a Build Artifact
       
      uses: actions/upload-artifact@v7.0.0
      with:
       name: Logs
       path: logs/

    - name: Publish Test Report
        if: always()
        users: dorny/test-reporter@v1
        with:
          name: TestNG Results
          path: target/surefire-reports/junitreports/TEST-*.xml
          reporter: java-junit
